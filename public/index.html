<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Travel IQ</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous">
</head>
<body>
  <div class="header">
    <a href="/"><h1>My Travel IQ</h1></a>
    <div class="header-actions">
      <div class="user-menu" id="userMenu">
        <button class="user-avatar-btn" id="userAvatarBtn" title="Account"></button>
        <div class="user-dropdown" id="userDropdown">
          <div class="user-dropdown-info" id="userDropdownInfo"></div>
          <button class="user-dropdown-item" id="logoutBtn">Log Out</button>
        </div>
      </div>
    </div>
  </div>
  <div id="map-section" style="display:none">
    <div id="trip-map"></div>
  </div>

  <div class="container" id="app">
    <div class="loading"><span class="spinner"></span> Loading...</div>
  </div>

  <!-- New Trip Modal -->
  <div class="modal-overlay" id="newTripModal" style="display:none">
    <div class="modal">
      <h2>New Trip</h2>
      <div class="form-group">
        <label>Trip Name</label>
        <input type="text" id="newTripName" placeholder="e.g. Summer in Italy">
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <textarea id="newTripDesc" rows="2" placeholder="Notes about this trip"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="document.getElementById('newTripModal').style.display='none'">Cancel</button>
        <button class="btn btn-primary" id="createTripBtn">Create Trip</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/app.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
